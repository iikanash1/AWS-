・Amazon Translate
ニューラル機械翻訳(NMT)を提供するフルマネージド型テキスト翻訳サービス。
リアルタイム翻訳やカスタム用語の適応が可能。

・Amazon Kendra
機械学習を活用したエンタープライズ向けの高度な検索サービス。
