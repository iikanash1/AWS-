提供するサービス。

・AWS Directory Service
Microsoft Active Directory(AD)との統合を実現するマネージド型ディレクトリサービス。
AWS上でAD環境を構築可能。

・AWS Firewall Manager
複数のAWSアカウントに対するWAF、Shield、Security Groupポリシーを一元管理し、
自動適応を可能にするサービス。

・AWS IAM
AWSリソースへのアクセス管理を提供するサービス。
ユーザー、グループ、ロール、ポリシーの設定が可能。

・AWS KMS
暗号鍵の作成・管理・使用を安全に実行するためのサービス。
データの暗号化や複合に利用。

・AWS Secrets Manager
データベース認証暗号、APIキー、その他のシークレットデータを安全に管理し、自動ローテーションを
提供するサービス。

・AWS Security Hub
AWS環境のセキュリティアラートとコンプライアンスステータスを統合的に可視化するセキュリティ管理サービス。

・AWS Shield
DDoS攻撃からAWSリソースを保護するサービス。
無料のAWS Shie Standardと、より高度な暴挙機能を提供するAWS Shield Advancedがある。

・AWS Single Sign-On
複数のAWSアカウントやSaaSアプリケーションへのシングルサインオンを提供する統合アクセス管理サービス。

・AWS WAE
ウェブアプリケーションを一般的なウェブ攻撃から保護するファイアウォールサービス。

・Amazon Detective
セキュリティイベントの相関分析を行い、驚異の調査・対応を支援するサービス。

・AWS RAM
AWSリソースを組織内または外部アカウントと安全に共有するためのサービス。

・AWS Network Firewall
VPC内のネットワークトラフィックをフィルタリングし、セキュリティを強化するフルマネージド型ネットワークファイアウォールサービス。

⑱サーバーレス
・AWS Fargate
コンテナの基盤インフラを管理せずに、Amazon ECS/EKSのタスクを実行できるサーバーレスコンピューティングエンジン。
スケーリングとリソースプロビジョニングを自動化。

・AWS Lambda
サーバーレスでコードを実行できるイベント駆動型コンピューティングサービス。
インフラ管理不要で自動スケーリングやマルチランタイムサポートを提供。

⑲ストレージ
・Amazon EBS
EC2インスタンス向けの高可用性・低レイテンシのブロックストレージサービス。
スナップショット作成、暗号化、プロビジョンドIOPSに対応。

・AWS Storage Gateway
オンプレミスのアプリケーションとAWSクラウドストレージを統合するハイブリッドストレージサービス。
ファイル、ボリューム、テープゲートウェイを提供。

・Amazon EFS
スケーラブルなフルマネージド型のNFSファイルシステム。
EC2、lambda、コンテナなどからアクセス可能で、従量課金制のストレージを提供。

・AWS DRS
オンプレミスおよびクラウドワークロードのディザスタリカバリを自動化し、最小限のダウンタイムで
復旧可能なサービス。

・Amazon FSx
Windowsファイルサーバー、Lustre、NetApp ONTAP、OpenZFSなどサポートするフルマネージド型
ファイルストレージサービス。

・AWS Backup
AWSサービス全体のデータを一元管理し、スケジュール設定、ポリシーベースのバックアップ・復元
を提供するサービス。

・Amazon S3
高可用性とスケーラビリティを備えたオブジェクトストレージサービス。
データの保存、バックアップ、アーカイブ、データレイク用途に最適。

・Amazon S3 Glacier
長期データアーカイブ・バックアップ向けの低コストストレージサービス。
迅速なリストアオプションを提供。

⑳範囲外のサービス
・Amazon GameLift
マルチプレイヤーゲーム向けの専用サーバーをデプロイ・スケール管理するマネージド型サービス。
自動スケーリングや低レイテンシーなゲーム体験を提供。

・Amazon Lumberyard
3Dゲーム開発向けの無料クロスプラットフォームゲームエンジン。
AWSとの統合機能を備え、フォーク版[Open 3D Engine(O3DE)]として継続開発中。

・AWS Elemental MediaConnect
高信頼性のライブビデオ転送を実現するメディア配信サービス。
放送事業者向けのコンテンツ配信を最適化。
ファイルベースのメディアコンテンツをマルチデバイス向けに変換するフォーマット変換サービス。
VOD(ビデオオンデマンド)向けに最適化。

・AWS Elemental MediaLive
放送品質のライブビデオストリーミングをリアルタイムでエンコードするサービス。
スポーツ中継やライブイベント配信に適応可能。

・AWS Elemental MediaPackage
OTT向けにビデオコンテンツをパッケージ化・保護するサービス。
DRM対応でセキュアなストリーミング配信を実現。

・AWS Elemental MediaStore
メディアワークフロー向けに最適化されたオブジェクトストレージ。
低レイテンシーのデータアクセスを提供し、ライブビデオ配信に適応可能。

AWS Elemental MediaTailor
ビデオストリームに動的な広告挿入を実装するサービス。広告ブロッカー対策やパーソナライズ広告配信が可能。

・AWS Elemental Appliancec&Software
メディア処理・配信向けの専用ハードウェアおよびソフトウェアソリューション。
放送事業者向けのオンプレミス設備とクラウド連帯を提供。

・Amazon IVS
低遅延のインタらくてぃ部ライブストリーミングを簡単に構築できるサービス。
チャットやリアクション機能を組み込んだ配信が可能。

・AWS RoboMaker
ロボットアプリケーションの開発・シミュレーション・デプロイを支援するクラウドベースのサービス。
ROSと統合し、スケーラブルなロボット開発を実現。
