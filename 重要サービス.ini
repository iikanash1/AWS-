重要サービス
①分析
・Amazon EMR
大規模なデータ処理を実行するマネージド型クラスタサービス。
Apache HadoopやApache Sparkなどの分散データ処理フレームワークを利用可能。

・Amazon Kinesis
ストリーミングデータをリアルタイムで収集、処理、分析するマネージド型サービス。
データの取り込みや処理をスケーラブルに実行できる。

・AWS Glue
ETL(抽出、変換、ロード)プロセスを自動化するフルマネージド型データ統合サービス。
データカタログ機能を備え、データ準備を効率化。

・Amazon OpenSearch Service
フルマネージ型の検索・分析エンジン[OpenSearch]を提供するサービス。
ログ分析、全文検索、可視化等に適応可能。

・Amazon Redshift
ペタバイト規模のデータを高速に処理できる。フルマネージド型データウェアハウス。
カラムナーストレージと並列処理により高性能なクエリを実行可能。

・Amazon QuickSight
サーバーレスのBI(ビジネスインテリジェンス)サービス。
データの可視化、分析、ダッシュボード作成が可能。
機械学習による洞察機能も搭載。

・Amazon MSK
Apache Kafkaをマネージドで提供するストリーミングデータ処理サービス。
スケーラブルなイベントストリーミングが可能。

・AWS Data Exchange
AWS Marketplaceを通じてサードパーティデータセットの発見、購入、統合を支援するデータ共有プラットフォーム。

・Amazon Athena
S3上のデータに対して標準SQLを使用し、サーバーレスでインタラクティブなクエリを実行できる
サービス。ビッグデータ分析にも適応可能。

②アプリケーション統合
・Amazon SNS
メッセージのプッシュ通知を行うフルマネージド型データの通知サービス。
アプリケーション間のメッセージ配信やモバイルデバイスへの通知が可能。

・Amazon SQS
分散システム間でメッセージを非同期で送受信するフルマネージド型メッセージキューサービス。
標準キューとFIFOキューを提供し、順序保障や重複帽子が可能。

・AWS Step Functions
AWSサービスやカスタムアプリケーションを統合し、視覚的にワークフローを設計・自動化できる
サーバーレスオーケストレーションサービス。
状態管理やエラーハンドリングを提供。

・・Amazon EventBridge
イベント駆動型アプリケーション向けのサーバーレスイベントバス。
AWSサービスやサードパーティアプリケーションからのイベントをるてぃんぐし、リアルタイム処理を実現。

③ビジネスアプリケーション
・Amazon Connect
クラウドベースのコンタクトセンターサービス。
音声通話、チャット、タスク管理を統合、セルフサービスで構築可能。
AIを活用した分析や自動応答も提供。

・Amazon SES
クラウドベースのメール送信サービス。
トランザクションメール、マーケティングメール、大量送信に対応し、スパム対策や
送信レピュテーション管理機能を備える。

④クラウド財務管理
・AWS Budgets
コストと使用量の予算を設定し、閾値を超えた際に通知を受け取る事ができるサービス。
コスト管理やリソース使用量の監視を効率化。

・AWS Cost and Usage Report
AWSリソースの詳細なコストと使用量データをCSVまたはParquet形式で提供するレポートサービス。
詳細な分析やカスタムレポートの作成が可能。

・AWS Cost Explorer
過去のコストと使用量データを可視化、分析し、将来の支出を予測するサービス。
グラフ表示やフィルタリング機能を備え、コスト最適化に活用可能。

・AWS Billing Conductor
AWSの課金データをカスタマイズし、複雑なコスト配分モデルを構築できるサービス。
組織単位でのコスト割り当てやカスタム請求書の作成が可能。

・AWS Marketplace
サードパーティのソフトウェア、データセット、サービスを購入・デプロイできるデジタルカタログ。
SaaS、AMI(Amazon Machine Image)、APIベースのサービスなどを提供。

⑤コンピューティング
・Amazon EC2
スケーラブルな仮想サーバーを提供するサービス。
オンデマンド、リザーブド、スポットインスタンス等柔軟な料金プランを選択可能。

・AWS Elastic Beanstalk
Webアプリケーションのデプロイ、スケーリング、管理を自動化するフルマネージド型PaaS。

・Amazon Lightsail
仮想サーバー、ストレージ、データベース、ネットワークなどのリソースをシンプルなUIで
デプロイ可能なサービス。小規模アプリや開発環境向け。

・AWS Outposts
オンプレミス環境にAWSのインフラサービスを拡張するハイブリットクラウドソリューション。
完全マネージド型でクラウドと同様の運用が可能。

・AWS Wavelength
5Gネットワークのエッジで超低遅延アプリケーションを実行するためのインフラストラクチャ。
通信事業者のネットワーク内にAWSサービスを統合。

・AWS Local Zones
特定の地理的エリアに低レイテンシーアクセスを提供するAWSインフラストラクチャ
EC2、EBS、RDSなどの主要サービスをローカルで利用可能。

・AWS Batch
バッチ処理ジョブを効率的に実行・管理するフルマネージド型ジョブ実行サービス。
大規模な計算ワークロードをスケーラブルに処理可能。

⑥コンテナ
・Amazon EKS
フルマネージド型のKubernetesサービス。
AWS上でKubernetesクラスターを簡単にデプロイ、管理、スケールできる。

・Amazon EC2
フルマネージド型のDockerコンテナレジストリ。
コンテナイメージの保存、管理、スキャン、デプロイを安全に実施。

・Amazon ESC
フルマネージド型のコンテナオーケストレーションサービス。
Fargate(サーバーレス)またはEC2ベースのコンテナ管理に対応。

⑦カスタマーエンゲージメント
・AWSの専門家とプロジェクトベースで連携し、技術支援やソリューション設計を依頼できる
マネージド型コンサルティングサービス。

・AMS
AWSリソースの運用・管理を代行するエンタープライズ向けフルマネージドサービス。
セキュリティ、コンプライアンス、最適化を支援。

・AWS Support
AWSの公式サポートプラン」。
技術的な問い合わせ。請求サポート、運用ガイダンスを提供し、エンタープライズ向けの優先サポートも
利用可能。

・AWS Activate
スタートアップ企業向けの支援プログラム
AWSクレジット、技術サポートトレーニング、ビジネス支援を提供。

⑧データベース
・Amazon Aurora
高パフォーマンスかつ可用性の高いフルマネージド型リレーショナルデータベースサービス。
MySQLおよびPostgreSQLと互換性を持ち、自動スケーリングやフェイルオーバーに対応。

・Amazon DynamoDB
高速でスケーラブルなフルマネージド型NoSQLデータベース。
キー・バリューおよびドキュメントデータモデルをサポートし、サーバーレスで運用可能。

・Amazon Neptune
フルマネージド型のグラフデータベースサービス。
ノード間の関係性や相関関係を効率的に管理し、RDFおよびProperty Grapfをサポート。

・Amazon RDS
フルマネージド型のリレーショナルデータベースサービス。
MySQL、PostgreSQL、MariaDB、Oracle、SQL Serverなど複数のデータベースエンジンをサポート。

・Amazon MemoryDB for Redis
Redis互換のインメモリデータベースサービス。
マイクロ秒レベルの低遅延を実現し、耐久性のあるストレージうぃ提供。

⑨デベロッパーツール
・AWS Cloud9
クラウドベースの統合開発環境。(IDE)
ブラウザ上でコードの記述、実行、デバックが可能。チームでの共同開発に対応。

・AWS CodeBuild
ソースコードをコンパイル、テスト、パッケージ化し、デプロイ可能なアーティファクトを生成する。
フルマネージド型CIサービス。

・AWS CodeCommit
Gitリポジトリをホストするフルマネージド型ソースコード管理サービス。
セキュリティと拡張性に優れ、AWS IAMと統合可能。

・AWS CodeDeploy
アプリケーションのデプロイを自動化し、ダウンタイムを最小限に抑えるデプロイ管理サービス。
EC2、Lambda、オンプレミス環境にも対応。

・AWS CodePipeline
継続的インテグレーション(CI)と継続的デリバリー(CD)を実現するワークフローオーケストレーションサービス
デプロイの自動化を支援。

・AWS CodeStar
アプリケーション開発プロジェクトを迅速にセットアップできる
統合開発プラットフォーム。CI/CDパイプラインと統合。

・AWS CLI
AWSサービスをコマンドラインから操作できる統合ツール。
スクリプトの自動化やリソース管理を効率化。

・AWS X-Ray
分散アプリケーションのパフォーマンス分析とデバックを支援するトレーシングサービス。
マイクロサービスの可視化が可能。

・AWS CodeArtifact
ソフトウェアパッケージの安全な保存、管理、公開、および共有を行う
フルマネージド型パッケージリポジトリサービス。

・AWS CloudShell
ブラウザベースのターミナル環境。
AWSリソースをコマンドラインで管理可能で、AWS CLIがプリインストールされている。

・AWS AppConfig
アプリケーション設定を動的に管理し、安全かつ段階的にロールアウトするための設定管理サービス。

⑩エンドユーザーコンピューティング
・Amazon AppStream
クラウド上でデスクトップアプリケーションをストリーミング配信するフルマネージド型サービス。
