AWS ソリューションアーキテクト アソシエイト
ストレージ
・オブジェクトストレージ
高い耐久性、容量無制限でファイルストレージと違い、ディレクトリ構造を持たない。
メタデータ(付加情報)を定義できる。複数のAZに複製し、冗長性を持たせる。
バージョン人具やMFA認証により誤削除を防ぐ。強い整合性を持つ。

☆用途
バックアップ(AWSのバックエンドサービス)、データレイク(ビッグデータを保存する容器のこと)
静的コンテンツのホスティング。

☆構成要素
バケット(保存領域のこと。一意の名称をつける。)
オブジェクト(データそのもの。一意のURLをもつ。)
メタデータ(作成日時、サイズなど。どんな情報を持たせるかユーザーがカスタマイズできる。)

・ストレージクラス
・STANDARD 耐久性99.999999999%、可用性99.99%。(デフォルト。低レイテンシと香スループットが売り。)
・STANDARD-IA 耐久性99.999999999%、可用性99.9%。
(STANDARDより廉価。参照頻度が低いデータ向けのため、読出に応じて課金)
・ ONEZONE-IA 耐久性99.999999999%、可用性99.5%。
(単一のAZ内のみで複製するため、AZ内で障害が発生した場合にデータ復元ができない。最も安価。)
・INTELLIGENT-TIERING 耐久性99.999999999%、可用性99.9%。
(STANDARDとSTANDARD-IAの2層構成。30日以上アクセスされないと自動的にSTANDARD-IAに移動される。)
・GLACIER 耐久性99.999999999%、可用性99.99%。
(ほとんど参照されないアーカイブ等。)

☆ライフサイクル管理
例えば…
        30日間             30日間
STANDARD   →  STANDARD-IA    →   GLACIER
初めはスタンダードを使い、30日間で参照されなくなるのでIAに移す、
また30日経ったら一番安いグレイシアに移す。
一定の期間を超えてストレージクラスを変えられること。

・GLACIERとは？
☆用途
アクセス頻度の低いデータのバックアップ。
安価なアーカイブ。

☆構成要素
ボールド(保存領域のこと。)
アーカイブデータ(データそのものを指す。一意のIDで管理。)
インベントリ(アーカイブの情報)
ジョブ(検索、ダウンロードなどの処理のこと。)

☆オプション
データの取り出しスピードを変更できる。※高速だと高価
高速、標準、バルク

☆セキュリティ
SSLで暗号化された状態でデータ転送される。
※ACLはバケット単位、オブジェクト単位と二重でアクセス制御できる必要があり、手間がかかるので、
パブリックアクセスによってアカウント単位で全オブジェクトへのアクセス制御ができる。

事前署名付きURL
(アプリケーション側で、対象オブジェクトへの制限付きアクセス許可を特定のユーザーに付与する。)

S3 Access Analyzer
(AWSアカウントの外部からアクセスできるリソースを特定。S3バケットに対する外部アカウントからの
アクセス情報を分析し、不正アクセスがないかを確認できる。)

暗号化
SSE 暗号化・復号化をS3側で自動。AES-256を標準使用。
CSE ユーザー側に独自の暗号キーを使用。
※SSE-Cでユーザー側で独自の暗号キー指定可

☆S3その他の機能
・S3への検索ツール
S3 Select
(クエリ（検索）を活用してS3オブジェクトに対してデータ分析を実行)

Redshit Spectrum
(S3に保存されたファイルをRedshiftにロードしたり特殊な準備をすることなく、高度なクエリを実行。)

Athena
(S3内のデータを標準SQLを使用して簡単に分析。(S3 Selectより高度で複雑))

・マルチアップロード
大容量オブジェクトをいくつかに分けてアップロード。
最大5TB、個々のオブジェクトPUTは最大5GB。

・S3 Transfer Acceleration
クライアントとS3バケットの間で、長距離にわたるファイル転送を高速、簡単、安全に行う。

・クロスリージョンレプリケーション
異なるAWSリージョンにある２つのバケット間でオブジェクトを自動的に非同期コピーする機能。
冗長化に使える。
同じAWSアカウントが所有するバケットにも、異なるアカウントが所有するバケットにも設定できる。

・Cross-Origin Resource Sharing
既にドメインが設定されているS3バケットを他のドメインに共有することが可能。

・AWS Lake Formation
S3を利用したデータレイク構成を容易に実施できる。

・ESF(エラスティックファイルシステム)
容量無制限、複数のEC2インスタンスから参照可能なファイルストレージ。
NFS(ネットワークファイルシステム)により、特別なソフトはインストール不要。
用途によってモードを選択できる。NFSv4プロトコルを使用。

☆要素
・ファイルシステム
ファイルごとに作成されるEFSのこと。
・マウントターゲット
冗長性を持たせるため各AZに分散されたファイルシステム。

EFS,Elastic File System
☆特徴
容量無制限、複数のEC2インスタンスから参照可能なファイルストレージ。
NFS(Network File System)により、特別なソフトはインストール不要。
用途によってモードを選択できる。

☆要素
・ファイルシステム(ファイルごとに作成されるEFSのこと。)
・マウントターゲット(冗長性を持たせるため各AZに分散されたファイルシステム。)

☆モード選択
・汎用モード
ファイルシステムオペレーション単位で最小レイテンシを実現。ランダムまたはシーケンシャルIOパターン
でも同じ結果を得る。

・バーストスループットモード
スループットがファイルシステムのサイズに合わせてスケールされる。
デフォルト(バーストスループットモード)より高い専用スループットを必要とするアプリケーションをサポートする
ように設計。

・最大I/Oモード
より高いスループットと1秒あたりの操作にスケールする。

☆アクセス頻度
標準アクセスと低頻度アクセスで切り替えが可能。

その他関連システム
・Amazon Data Lifecycle Manager(Amazon DLM)
☆特徴
EBSのバックアップであるスナップショットの作成、保存、削除を自動化。
定時バックアップをスケジュールして貴重なデータを保護。

☆用途
EBSの定期的なバックアップスケジュールを実施して貴重なデータを保護する。
監査担当者または社内のコンプライアンスが必要とするバックアップを保持する。
古いバックアップを削除してストレージコストを削減する。

・Amazon FSx
SMBプロトコルに基づいて最大数千台のインスタンスからアクセス可能となるNTFSファイルシステム。






