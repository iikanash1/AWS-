AWSとは
クラウドコンピューティングのデプロイモデル。
デベロッパーやIT部門は調達、保守、容量計画などの作業を行わなくてよいため、最も重要な事に注力できる。

・オンプレミス
サーバーやネットワーク機器、ソフトウェアなどのITインフラを自社施設内に設置し、
直接管理・運用する「自社運用」の形態。
です。クラウドサービスとは異なり、カスタマイズの自由度が高く、
強固なセキュリティを確保できる反面、初期コストが高く運用負荷がかかる特徴がある。

・クラウドコンピューティング
主に従量制料金によって、インターネット経由でITリソースをオンデマンドで提供すること。
これを利用すると、企業はハードウェアとデータセンターを自分で管理したり保守したりする必要がなくなる。
AWSのような企業がデータセンターを所有および保守し、インターネット仮想センターの技術とサービスを企業やユーザーに提供する。

・ハイブリッドデプロイ
クラウドベースのリソースと、クラウドに配置されていない既存のリソースとの間でインフラストラクチャと
アプリケーションを接続する方法。

